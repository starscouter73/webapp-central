name: Deploy Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to webapp-central.de
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git_safe="git -c safe.directory=${{ secrets.DEPLOY_PATH }}"
            if [ ! -d .git ]; then
              $git_safe init
              $git_safe remote add origin "https://github.com/${{ github.repository }}.git"
            fi
            $git_safe remote set-url origin "https://github.com/${{ github.repository }}.git"
            $git_safe fetch --all --prune
            $git_safe checkout -B main origin/main
            $git_safe reset --hard origin/main
            if [ ! -f .env ]; then
              echo "Server .env fehlt unter ${{ secrets.DEPLOY_PATH }}. Deploy abgebrochen." >&2
              echo "Lege dort zuerst eine produktive .env auf Basis von .env.example an." >&2
              exit 1
            fi
            docker compose --env-file .env config >/dev/null
            docker compose --env-file .env up -d --build
