name: Deploy Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to webapp-central.de
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect compose-impacting changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.event.before }}"

          if [ -n "$base_ref" ] && [ "$base_ref" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$base_ref^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$base_ref" "${{ github.sha }}")"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          else
            changed_files="$(git show --pretty='' --name-only HEAD)"
          fi

          echo "$changed_files"
          if echo "$changed_files" | grep -E '^(Dockerfile|docker-compose\.yml|docker/)' >/dev/null; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare deploy path
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f .env ]; then
              echo "Server .env fehlt unter ${{ secrets.DEPLOY_PATH }}. Deploy abgebrochen." >&2
              echo "Lege dort zuerst eine produktive .env auf Basis von .env.example an." >&2
              exit 1
            fi

      - name: Upload application files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          overwrite: true
          strip_components: 0
          source: "public,src,docker,Dockerfile,docker-compose.yml,.env.example,README.md,DOKUMENTATION_INFRASTRUKTUR_ENTWICKLUNGSWEG.md"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Finalize on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          NEEDS_REBUILD: ${{ steps.changes.outputs.needs_rebuild }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: NEEDS_REBUILD
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if docker ps >/dev/null 2>&1; then
              docker compose --env-file .env config >/dev/null
              docker compose --env-file .env up -d --build
              exit 0
            fi

            if [ "$NEEDS_REBUILD" = "true" ]; then
              echo "Dateisync abgeschlossen, aber Docker ist fuer den Deploy-Benutzer nicht erreichbar." >&2
              echo "Da Compose-relevante Dateien geaendert wurden, wird der Deploy hier bewusst abgebrochen." >&2
              exit 1
            fi

            echo "Dateisync abgeschlossen. Docker ist fuer den Deploy-Benutzer nicht erreichbar; Code-Deploy bleibt bei Bind-Mount-Setup dennoch wirksam."
