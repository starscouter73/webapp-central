name: PHP Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Lint application files
        shell: bash
        run: |
          while IFS= read -r file; do
            php -l "$file"
          done < <(find public src -type f -name "*.php" | sort)
