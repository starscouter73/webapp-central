name: PHP Lint

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name "*.php" -not -path "./tools/*")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PHP files found"
            exit 0
          fi
          php -l "${files[0]}"
          for file in "${files[@]:1}"; do
            php -l "$file"
          done
