services:
  web:
    image: "${APP_IMAGE:-local/webapp-central-web:latest}"
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "${APP_CONTAINER_NAME:-webapp-central-web}"
    ports:
      - "${HOST_HTTP_BIND:-127.0.0.1}:${HOST_HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_SITE_NAME: "${APP_SITE_NAME:-webapp-central.de}"
      APP_SITE_TITLE: "${APP_SITE_TITLE:-Webapp Central}"
      APP_TAGLINE: "${APP_TAGLINE:-Zentrale Arbeitsflaeche fuer Webprojekte, Inhalte und Entwicklung.}"
      APP_LEGAL_NAME: "${APP_LEGAL_NAME:-Mark Dorth}"
      APP_LEGAL_ADDRESS_STREET: "${APP_LEGAL_ADDRESS_STREET:-}"
      APP_LEGAL_ADDRESS_POSTAL: "${APP_LEGAL_ADDRESS_POSTAL:-}"
      APP_LEGAL_ADDRESS_CITY: "${APP_LEGAL_ADDRESS_CITY:-}"
      APP_LEGAL_COUNTRY: "${APP_LEGAL_COUNTRY:-Deutschland}"
      APP_LEGAL_EMAIL: "${APP_LEGAL_EMAIL:-}"
      APP_LEGAL_PHONE: "${APP_LEGAL_PHONE:-}"
      APP_LEGAL_VAT_ID: "${APP_LEGAL_VAT_ID:-}"
      APP_LEGAL_RESPONSIBLE_PERSON: "${APP_LEGAL_RESPONSIBLE_PERSON:-Mark Dorth}"
      APP_LEGAL_PRIVACY_EMAIL: "${APP_LEGAL_PRIVACY_EMAIL:-}"
      APP_LEGAL_DISPUTE_NOTICE: "${APP_LEGAL_DISPUTE_NOTICE:-}"
    restart: unless-stopped
